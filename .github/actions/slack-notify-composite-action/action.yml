name: Slack channel notification
description: "Send notification to Slack channel"

inputs:
  slack-channel:
    description: "The name of the Slack channel to which notifications will be sent. Default - laa-crimeapps-ci"
    required: false
    default: "laa-crimeapps-ci"
  webhook-url:
    description: "The webhook URL of the Slack channel."
    required: true

runs:
  using: "composite"
  steps:
    - name: Calculate build start time
      id: build-run-time
      shell: bash
      run: |
        echo "BUILD_RUN_TIME=$(date +'%d/%m/%Y %T')" >> $GITHUB_OUTPUT

    - name: Notify success to Slack
      id: slack-success
      if: ${{ success() }}
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 #v3
      with:
        webhook: ${{ inputs.webhook-url }}
        webhook-type: incoming-webhook
        payload: |
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "Deployment Successful! :partying_face:",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Project:* ${{ github.event.repository.name }}" },
                  { "type": "mrkdwn", "text": "*When:* ${{ steps.build-run-time.outputs.BUILD_RUN_TIME }}" },
                  { "type": "mrkdwn", "text": "*Branch:* \n${{ github.ref_name }}" },
                  { "type": "mrkdwn", "text": "*Successful Job:* \n${{ github.job }}" }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "action_id": "deployment_link",
                    "text": { "type": "plain_text", "text": "View Run" },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }

    - name: Notify failure to Slack
      if: ${{ failure() }}
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95
      with:
        webhook: ${{ inputs.webhook-url }}
        webhook-type: incoming-webhook
        payload: |
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "Deployment Failed :x:",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Repo:* ${{ github.repository }}" },
                  { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                  { "type": "mrkdwn", "text": "*Job:*\n${{ github.job }}" },
                  { "type": "mrkdwn", "text": "*Actor:*\n${{ github.actor }}" },
                  { "type": "mrkdwn", "text": "*When:* ${{ steps.build-run-time.outputs.BUILD_RUN_TIME }}" },
                  { "type": "mrkdwn", "text": "*Workflow:*\n${{ github.workflow }}" }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "action_id": "run_link",
                    "text": { "type": "plain_text", "text": "View Run" },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }